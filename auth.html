<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン / 新規登録 - VoteChat</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">VoteChat</a>
        <div class="nav-links" id="auth-links"></div>
    </header>

    <main class="container" style="max-width: 500px; display: flex; align-items: center;">
        <div class="glass-panel" style="width: 100%;">
            <div id="login-section">
                <h2 class="text-center" style="margin-bottom: 2rem;">ログイン</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>ユーザー名</label>
                        <input type="text" id="login-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>パスワード</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <div id="login-error" style="color: var(--danger-color); margin-bottom: 1rem; font-size: 0.9rem;"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">ログイン</button>
                </form>
                <div class="text-center mt-2">
                    <span style="color: var(--text-secondary);">アカウントを持っていませんか？</span>
                    <a href="#" onclick="toggleAuth('register')">新規登録</a>
                </div>
            </div>

            <div id="register-section" class="hidden">
                <h2 class="text-center" style="margin-bottom: 2rem;">新規登録</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label>ユーザー名</label>
                        <input type="text" id="reg-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>パスワード</label>
                        <input type="password" id="reg-password" class="form-control" required>
                    </div>
                    <div id="reg-error" style="color: var(--danger-color); margin-bottom: 1rem; font-size: 0.9rem;"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">登録</button>
                </form>
                <div class="text-center mt-2">
                    <span style="color: var(--text-secondary);">すでにアカウントをお持ちですか？</span>
                    <a href="#" onclick="toggleAuth('login')">ログイン</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
